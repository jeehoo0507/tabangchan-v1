<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="기숙사 타방 관리 앱">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- PWA / iOS -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="타방찬">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>타방찬</title>
  <link rel="manifest" href="manifest.json">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #ffffff; }
  </style>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>

  <script>

    // Push Service Worker 등록 (/push-scope/ — Flutter SW와 충돌 방지)
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        regs.forEach(function(reg) {
          if (reg.active && reg.active.scriptURL.includes('push_sw.js')
              && !reg.scope.includes('push-scope')) {
            reg.unregister();
          }
        });
      });
      if ('PushManager' in window) {
        navigator.serviceWorker.register('/push_sw.js', { scope: '/push-scope/' })
          .then(function(reg) { window._pushSwReg = reg; })
          .catch(function(e) { console.warn('push SW 등록 실패:', e); });
      }
    }

    window.subscribePush = function(vapidPublicKey) {
      return new Promise(function(resolve, reject) {
        var attempts = 0;
        function trySubscribe() {
          if (window._pushSwReg) {
            var key = Uint8Array.from(
              atob(vapidPublicKey.replace(/-/g,'+').replace(/_/g,'/')),
              function(c){ return c.charCodeAt(0); }
            );
            window._pushSwReg.pushManager.subscribe({
              userVisibleOnly: true, applicationServerKey: key,
            }).then(function(sub){ resolve(JSON.stringify(sub.toJSON())); }).catch(reject);
          } else if (attempts++ < 30) {
            setTimeout(trySubscribe, 100);
          } else {
            reject('SW not ready');
          }
        }
        trySubscribe();
      });
    };
  </script>
</body>
</html>
